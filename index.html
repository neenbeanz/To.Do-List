<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tasks" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Tasks</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230a0a0a'/><text y='68' x='50' text-anchor='middle' font-size='58' font-family='system-ui' fill='white'>✓</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0a; color: #fff; font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    button { font-family: inherit; }
    @keyframes slideUp  { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
    @keyframes fadeIn   { from { opacity:0 } to { opacity:1 } }
    #header { padding-top: max(16px, env(safe-area-inset-top)); }
    #body    { padding-bottom: max(24px, env(safe-area-inset-bottom)); }
    .task-row:hover { background: #1a1a1a !important; }
    .task-row:hover .del-btn { display: flex !important; }
    .add-btn:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(255,255,255,0.25) !important; }
    .section-block { background:#111; border:1px solid #222; border-radius:12px; overflow:hidden; margin-bottom:12px; }
    .section-hdr   { width:100%; background:transparent; border:none; padding:16px 20px; display:flex; align-items:center; gap:12px; cursor:pointer; text-align:left; }
    .sub-hdr       { width:100%; background:transparent; border:none; padding:8px 20px 4px; display:flex; align-items:center; gap:8px; cursor:pointer; text-align:left; }
    .chevron { display:inline-block; transition:transform 0.2s; font-size:16px; color:#444; }
    .chevron.up { transform:rotate(-90deg); }
    .modal-bg  { position:fixed; inset:0; background:rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(6px); animation:fadeIn 0.15s ease; }
    .modal-box { background:#141414; border:1px solid #2a2a2a; border-radius:16px; padding:32px 28px; width:420px; max-width:90vw; box-shadow:0 40px 80px rgba(0,0,0,0.6); animation:slideUp 0.2s ease; }
    .tag-pill  { border-radius:20px; padding:6px 14px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; transition:all 0.15s; border:1px solid #333; background:transparent; color:#666; }
    .tag-pill.active-deadline { background:#3a1a1a; border-color:#FF4D4D; color:#FF4D4D; }
    .tag-pill.active-starred  { background:#2a2a1a; border-color:#FFD700; color:#FFD700; }
    .filter-pill { border-radius:20px; padding:6px 12px; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:5px; transition:all 0.15s; font-family:'DM Sans',sans-serif; border:1px solid #2a2a2a; background:transparent; color:#555; }
    .filter-pill.active-deadline { background:#3a1a1a; border-color:#FF4D4D; color:#FF4D4D; }
    .filter-pill.active-starred  { background:#2a2a1a; border-color:#FFD700; color:#FFD700; }
    #toast { position:fixed; bottom:max(24px,env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); background:#1e1e1e; border:1px solid #333; border-radius:10px; padding:10px 18px; font-size:13px; color:#aaa; z-index:500; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; }
    #toast.show { opacity:1; }
    #sync-dot { width:7px; height:7px; border-radius:50%; background:#34D399; display:inline-block; margin-left:6px; vertical-align:middle; transition:background 0.3s; }
    #sync-dot.syncing { background:#FFD700; }
    #sync-dot.error   { background:#FF4D4D; }
  </style>
</head>
<body>
<div id="root"></div>
<div id="toast"></div>

<script>
// ─── Supabase config ──────────────────────────────────────────────────────────
const SUPABASE_URL = "https://ojprjuwyxnbskrgfmmed.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qcHJqdXd5eG5ic2tyZ2ZtbWVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTQxMDcsImV4cCI6MjA5NjQzMDEwN30.dqpJoubLCramd98o1B79hIi--U0aC_YDR_OCFV7wnwU";

const api = {
  async get() {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/tasks?order=id.asc`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    return r.json();
  },
  async insert(task) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/tasks`, {
      method: "POST",
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", Prefer: "return=representation" },
      body: JSON.stringify(task)
    });
    const data = await r.json();
    return data[0];
  },
  async update(id, patch) {
    await fetch(`${SUPABASE_URL}/rest/v1/tasks?id=eq.${id}`, {
      method: "PATCH",
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
      body: JSON.stringify(patch)
    });
  },
  async delete(id) {
    await fetch(`${SUPABASE_URL}/rest/v1/tasks?id=eq.${id}`, {
      method: "DELETE",
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
  }
};

// ─── Data ─────────────────────────────────────────────────────────────────────
const SECTIONS = [
  { id:"grind",    label:"GRIND",    subsections:["Active","Workshop","Strategic"] },
  { id:"adult",    label:"ADULT",    subsections:["Active","Workshop","Strategic"] },
  { id:"personal", label:"PERSONAL", subsections:["Active","Workshop","Discovery"] },
  { id:"admin",    label:"ADMIN",    subsections:["Admin","Operational","Discovery"] },
];
const COLORS = { grind:"#FF4D4D", adult:"#4D9FFF", personal:"#A78BFA", admin:"#34D399" };

function load(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

let state = {
  tasks: [],
  sectionCollapsed: load("sectionCollapsed", {}),
  subCollapsed:     load("subCollapsed", {}),
  filter:    null,
  showModal: false,
  loading:   true,
};

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, duration=2000) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), duration);
}
function setSyncDot(state) {
  const d = document.getElementById("sync-dot");
  if (d) { d.className = ""; d.classList.add(state==="ok"?"":"syncing"===state?"syncing":"error"); }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  render();
  try {
    state.tasks = await api.get();
    state.loading = false;
    render();
  } catch(e) {
    state.loading = false;
    toast("⚠️ Couldn't connect — check your internet", 4000);
    render();
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  root.innerHTML = "";

  // Header
  const hdr = el("div", { id:"header", style:"position:sticky;top:0;z-index:50;background:rgba(10,10,10,0.95);backdrop-filter:blur(12px);border-bottom:1px solid #1a1a1a;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;" });
  const titleWrap = el("div");
  const h1row = el("div", {style:"display:flex;align-items:center;gap:6px;"});
  h1row.appendChild(el("h1", { style:"font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:5px;color:#fff;line-height:1;" }, "TASKS"));
  const dot = el("span", {id:"sync-dot"}); h1row.appendChild(dot);
  titleWrap.appendChild(h1row);
  const remaining = state.tasks.filter(t=>!t.done).length;
  titleWrap.appendChild(el("span", { style:"font-size:11px;color:#555;letter-spacing:2px;" }, state.loading ? "LOADING..." : `${remaining} REMAINING`));
  hdr.appendChild(titleWrap);

  const btnRow = el("div", { style:"display:flex;gap:8px;align-items:center;" });
  const df = el("button", { class:`filter-pill ${state.filter==="deadline"?"active-deadline":""}` });
  df.innerHTML = "<span>◈</span> Deadline";
  df.onclick = () => { state.filter = state.filter==="deadline" ? null : "deadline"; render(); };
  btnRow.appendChild(df);
  const sf = el("button", { class:`filter-pill ${state.filter==="starred"?"active-starred":""}` });
  sf.innerHTML = "<span>★</span> Starred";
  sf.onclick = () => { state.filter = state.filter==="starred" ? null : "starred"; render(); };
  btnRow.appendChild(sf);
  const addBtn = el("button", { class:"add-btn", style:"width:40px;height:40px;border-radius:12px;background:#fff;border:none;color:#000;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:bold;line-height:1;box-shadow:0 4px 20px rgba(255,255,255,0.15);transition:transform 0.15s,box-shadow 0.15s;" }, "+");
  addBtn.onclick = () => { state.showModal = true; render(); };
  btnRow.appendChild(addBtn);
  hdr.appendChild(btnRow);
  root.appendChild(hdr);

  // Body
  const body = el("div", { id:"body", style:"max-width:680px;margin:0 auto;padding:24px 20px;" });

  if (state.loading) {
    body.appendChild(el("div",{style:"color:#444;text-align:center;padding:60px 0;font-size:14px;"},"Loading your tasks..."));
  } else if (state.filter) {
    const filtered = state.tasks.filter(t => t.tag === state.filter);
    const wrap = el("div", { style:"animation:fadeIn 0.2s ease;" });
    const fhdr = el("div", { style:"display:flex;align-items:center;gap:10px;margin-bottom:20px;" });
    fhdr.appendChild(el("span", { style:`color:${state.filter==="deadline"?"#FF4D4D":"#FFD700"};font-size:18px;` }, state.filter==="deadline"?"◈":"★"));
    fhdr.appendChild(el("span", { style:"font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#fff;" }, state.filter.toUpperCase()+" TASKS"));
    fhdr.appendChild(el("span", { style:"color:#555;font-size:13px;" }, `(${filtered.length})`));
    wrap.appendChild(fhdr);
    if (!filtered.length) wrap.appendChild(el("div",{style:"color:#444;text-align:center;padding:40px 0;font-style:italic;font-size:14px;"},`No ${state.filter} tasks yet`));
    filtered.forEach(task => {
      const sec = SECTIONS.find(s=>s.id===task.section);
      const card = el("div",{style:"background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:4px 8px;margin-bottom:6px;"});
      card.appendChild(el("div",{style:"padding:4px 6px 2px;"},el("span",{style:`font-size:9px;letter-spacing:2px;color:${COLORS[task.section]};font-family:'Bebas Neue',sans-serif;`},`${sec.label} · ${task.subsection.toUpperCase()}`)));
      card.appendChild(taskRow(task));
      wrap.appendChild(card);
    });
    body.appendChild(wrap);
  } else {
    SECTIONS.forEach(sec => body.appendChild(sectionBlock(sec)));
  }

  root.appendChild(body);
  if (state.showModal) root.appendChild(modal());
}

function sectionBlock(sec) {
  const isCollapsed = state.sectionCollapsed[sec.id];
  const tasks = state.tasks.filter(t=>t.section===sec.id);
  const accent = COLORS[sec.id];
  const block = el("div",{class:"section-block"});
  const hdr = el("button",{class:"section-hdr"});
  hdr.appendChild(el("span",{style:`width:4px;height:22px;border-radius:2px;background:${accent};flex-shrink:0;`}));
  hdr.appendChild(el("span",{style:"font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#fff;flex:1;"},sec.label));
  if (tasks.length) hdr.appendChild(el("span",{style:"color:#555;font-size:12px;"},`${tasks.filter(t=>t.done).length}/${tasks.length}`));
  hdr.appendChild(el("span",{class:`chevron ${isCollapsed?"up":""}`},"▾"));
  hdr.onclick = () => { state.sectionCollapsed[sec.id]=!state.sectionCollapsed[sec.id]; save("sectionCollapsed",state.sectionCollapsed); render(); };
  block.appendChild(hdr);
  if (!isCollapsed) {
    const inner = el("div",{style:"padding-bottom:8px;"});
    sec.subsections.forEach(sub => {
      const subKey = `${sec.id}__${sub}`;
      const isSubCollapsed = state.subCollapsed[subKey];
      const subTasks = tasks.filter(t=>t.subsection===sub);
      const subWrap = el("div",{style:"margin-bottom:4px;"});
      const subHdr = el("button",{class:"sub-hdr"});
      subHdr.appendChild(el("span",{style:`font-size:10px;letter-spacing:2px;color:${accent};font-family:'Bebas Neue',sans-serif;opacity:0.75;`},sub.toUpperCase()));
      subHdr.appendChild(el("div",{style:"flex:1;height:1px;background:#1e1e1e;"}));
      subHdr.appendChild(el("span",{style:"font-size:11px;color:#444;margin-right:4px;"},subTasks.length));
      subHdr.appendChild(el("span",{class:`chevron ${isSubCollapsed?"up":""}`,style:"color:#333;font-size:12px;"},"▾"));
      subHdr.onclick = () => { state.subCollapsed[subKey]=!state.subCollapsed[subKey]; save("subCollapsed",state.subCollapsed); render(); };
      subWrap.appendChild(subHdr);
      if (!isSubCollapsed) {
        const tWrap = el("div",{style:"padding:0 8px;"});
        if (!subTasks.length) tWrap.appendChild(el("div",{style:"padding:6px 14px;color:#333;font-size:12px;font-style:italic;"},"No tasks"));
        subTasks.forEach(t => tWrap.appendChild(taskRow(t)));
        subWrap.appendChild(tWrap);
      }
      inner.appendChild(subWrap);
    });
    block.appendChild(inner);
  }
  return block;
}

function taskRow(task) {
  const accent = COLORS[task.section];
  const row = el("div",{class:"task-row",style:"display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;transition:background 0.15s;margin-bottom:2px;"});
  const cb = el("button",{style:`width:20px;height:20px;border-radius:6px;flex-shrink:0;border:1.5px solid ${task.done?accent:"#444"};background:${task.done?accent:"transparent"};cursor:pointer;display:flex;align-items:center;justify-content:center;`});
  if (task.done) cb.appendChild(el("span",{style:"color:#000;font-size:11px;font-weight:bold;"},"✓"));
  cb.onclick = async () => {
    const newDone = !task.done;
    state.tasks = state.tasks.map(t=>t.id===task.id?{...t,done:newDone}:t);
    render();
    try { await api.update(task.id, {done: newDone}); } catch { toast("⚠️ Sync failed"); }
  };
  row.appendChild(cb);
  row.appendChild(el("span",{style:`flex:1;font-size:14px;color:${task.done?"#555":"#ccc"};text-decoration:${task.done?"line-through":"none"};font-family:'DM Sans',sans-serif;`},task.title));
  const icons = el("div",{style:"display:flex;gap:6px;align-items:center;"});
  if (task.tag==="deadline") icons.appendChild(el("span",{style:"color:#FF4D4D;font-size:13px;"},"◈"));
  if (task.tag==="starred")  icons.appendChild(el("span",{style:"color:#FFD700;font-size:14px;"},"★"));
  const del = el("button",{class:"del-btn",style:"display:none;background:transparent;border:none;color:#444;cursor:pointer;font-size:16px;padding:0 2px;line-height:1;transition:color 0.15s;"},"×");
  del.onmouseenter = () => del.style.color="#ff4d4d";
  del.onmouseleave = () => del.style.color="#444";
  del.onclick = async () => {
    state.tasks = state.tasks.filter(t=>t.id!==task.id);
    render();
    try { await api.delete(task.id); toast("Task deleted"); } catch { toast("⚠️ Sync failed"); }
  };
  icons.appendChild(del);
  row.appendChild(icons);
  return row;
}

function modal() {
  let mSection = SECTIONS[0].id;
  let mSub = SECTIONS[0].subsections[0];
  let mTag = null;
  const bg = el("div",{class:"modal-bg"});
  bg.onclick = e => { if(e.target===bg){state.showModal=false;render();} };
  const box = el("div",{class:"modal-box"});
  box.appendChild(el("h2",{style:"font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;margin-bottom:24px;letter-spacing:2px;"},"NEW TASK"));
  const input = el("input",{placeholder:"What needs to be done?",style:"width:100%;background:#1e1e1e;border:1px solid #333;border-radius:8px;padding:12px 14px;color:#fff;font-size:15px;outline:none;margin-bottom:20px;box-sizing:border-box;font-family:'DM Sans',sans-serif;"});
  input.onfocus=()=>input.style.borderColor="#555"; input.onblur=()=>input.style.borderColor="#333";
  box.appendChild(input);
  box.appendChild(lbl("SECTION"));
  const secGrid=el("div",{style:"display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;"});
  const subRow=el("div",{style:"display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;"});
  function rebuildSubs(){
    subRow.innerHTML="";
    const subs=SECTIONS.find(s=>s.id===mSection).subsections;
    if(!subs.includes(mSub)) mSub=subs[0];
    subs.forEach(sub=>{
      const b=el("button",{class:`tag-pill ${mSub===sub?"active-"+mSection:""}`,style:`border-color:${mSub===sub?COLORS[mSection]:"#333"};color:${mSub===sub?COLORS[mSection]:"#666"};background:${mSub===sub?"#2a2a2a":"transparent"};`},sub);
      b.onclick=()=>{mSub=sub;rebuildSubs();};
      subRow.appendChild(b);
    });
  }
  SECTIONS.forEach(sec=>{
    const b=el("button",{style:`background:${mSection===sec.id?COLORS[sec.id]:"#1e1e1e"};border:1px solid ${mSection===sec.id?COLORS[sec.id]:"#333"};color:${mSection===sec.id?"#000":"#aaa"};border-radius:8px;padding:9px 12px;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;`},sec.label);
    b.onclick=()=>{mSection=sec.id;mSub=SECTIONS.find(s=>s.id===mSection).subsections[0];secGrid.querySelectorAll("button").forEach((btn,i)=>{const s=SECTIONS[i];btn.style.background=mSection===s.id?COLORS[s.id]:"#1e1e1e";btn.style.borderColor=mSection===s.id?COLORS[s.id]:"#333";btn.style.color=mSection===s.id?"#000":"#aaa";});rebuildSubs();};
    secGrid.appendChild(b);
  });
  box.appendChild(secGrid);
  box.appendChild(lbl("SUBSECTION"));
  box.appendChild(subRow);
  rebuildSubs();
  box.appendChild(lbl("TAG (OPTIONAL)"));
  const tagRow=el("div",{style:"display:flex;gap:8px;margin-bottom:28px;"});
  ["deadline","starred"].forEach(t=>{
    const b=el("button",{class:`tag-pill`,style:"display:flex;align-items:center;gap:6px;"});
    b.innerHTML=`<span>${t==="deadline"?"◈":"★"}</span>${t.charAt(0).toUpperCase()+t.slice(1)}`;
    b.onclick=()=>{mTag=mTag===t?null:t;tagRow.querySelectorAll("button").forEach((btn,i)=>{const tt=["deadline","starred"][i];btn.className=`tag-pill ${mTag===tt?"active-"+tt:""}`;});};
    tagRow.appendChild(b);
  });
  box.appendChild(tagRow);
  const btnRow=el("div",{style:"display:flex;gap:10px;"});
  const cancel=el("button",{style:"flex:1;background:transparent;border:1px solid #333;color:#666;border-radius:8px;padding:12px;cursor:pointer;font-size:14px;"},"Cancel");
  cancel.onclick=()=>{state.showModal=false;render();};
  const addB=el("button",{style:"flex:2;background:#fff;border:none;color:#000;border-radius:8px;padding:12px;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;"},"ADD TASK");
  addB.onclick=async()=>{
    const title=input.value.trim(); if(!title) return;
    const newTask={title,section:mSection,subsection:mSub,tag:mTag||null,done:false};
    state.showModal=false;
    try {
      const saved=await api.insert(newTask);
      state.tasks.push(saved);
      toast("Task added ✓");
    } catch { toast("⚠️ Couldn't save task"); }
    render();
  };
  input.onkeydown=e=>{if(e.key==="Enter")addB.click();};
  btnRow.appendChild(cancel); btnRow.appendChild(addB);
  box.appendChild(btnRow);
  bg.appendChild(box);
  setTimeout(()=>input.focus(),50);
  return bg;
}

function el(tag,attrs={},...children){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){if(k==="class")e.className=v;else e.setAttribute(k,v);}
  children.forEach(c=>{if(typeof c==="string")e.appendChild(document.createTextNode(c));else if(c instanceof Node)e.appendChild(c);});
  return e;
}
function lbl(text){return el("label",{style:"color:#777;font-size:11px;letter-spacing:2px;font-family:'Bebas Neue',sans-serif;display:block;margin-bottom:8px;"},text);}

boot();
</script>
</body>
</html>
